name: GitHub Pages CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Patch
        env:
          A78706: ${{ secrets.A78706 }}
          B26C3D: ${{ secrets.B26C3D }}
        run: |
          python3 -c "
          import os, pathlib, sys
          k1 = os.environ.get('A78706', '')
          k2 = os.environ.get('B26C3D', '')
          idx = pathlib.Path('index.html')
          txt = idx.read_text(encoding='utf-8')
          out = txt.replace('<!-- 89bc467236fc8a096a3e709c1ee227f0b907c976ba -->', k1) if k1 else txt
          out = out.replace('<!-- 1d24186f6a86667b73581a0c8c0cada412e5439f0903fd -->', k2) if k2 else out
          if out == txt and (k1 or k2):
              sys.exit(1)
          if out != txt:
              idx.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: pages-deploy
        uses: actions/deploy-pages@v4
